<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .card{fill:#f5efe2;stroke:#e8dfc8;stroke-width:1.5;rx:10;}
      .accent{fill:#efe6fb;stroke:#7c3aed;stroke-width:1.5;}
      .sand{fill:#fdeede;stroke:#d97706;stroke-width:1.5;}
      .t{fill:#2a1f10;font-size:15px;font-weight:600;}
      .s{fill:#6b5b43;font-size:11.5px;}
      .lbl{fill:#7c3aed;font-size:11px;font-weight:600;}
      .flow{stroke:#7c3aed;stroke-width:2;fill:none;marker-end:url(#arrow);}
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="540" fill="#fcf9f4"/>
  <text x="28" y="38" fill="#2a1f10" font-size="22" font-weight="700">BenchHub — the typed-contract pipeline</text>
  <text x="28" y="60" class="s" font-size="13">Every box agrees on a field's <tspan font-weight="700">kind</tspan> (image / mask / depth / label / … / sequence / registered), so data is decoded, scored, and rendered without guessing.</text>

  <!-- Row 1: import → dataset → leaderboard -->
  <rect class="card" x="28" y="92" width="180" height="78" rx="10"/>
  <text class="t" x="42" y="120">HuggingFace repo</text>
  <text class="s" x="42" y="140">tabular (Croissant /</text>
  <text class="s" x="42" y="156">parquet) or file-tree</text>

  <rect class="card" x="262" y="92" width="190" height="78" rx="10"/>
  <text class="t" x="276" y="120">Import</text>
  <text class="s" x="276" y="140">one button: tabular →</text>
  <text class="s" x="276" y="156">file-tree mapper fallback</text>

  <rect class="card" x="506" y="92" width="190" height="78" rx="10"/>
  <text class="t" x="520" y="120">Dataset</text>
  <text class="s" x="520" y="140">preview tier (cheap,</text>
  <text class="s" x="520" y="156">downscaled) · typed fields</text>

  <rect class="accent" x="750" y="92" width="222" height="78" rx="10"/>
  <text class="t" x="764" y="120">Leaderboard</text>
  <text class="s" x="764" y="140">pred contract + materialized</text>
  <text class="s" x="764" y="156">full-res sample subset</text>

  <line class="flow" x1="208" y1="131" x2="258" y2="131"/>
  <line class="flow" x1="452" y1="131" x2="502" y2="131"/>
  <line class="flow" x1="696" y1="131" x2="746" y2="131"/>

  <!-- Row 2: client loop -->
  <rect class="card" x="750" y="250" width="222" height="92" rx="10"/>
  <text class="t" x="764" y="278">benchhub-client</text>
  <text class="s" x="764" y="298">iter_samples → predict →</text>
  <text class="s" x="764" y="314">submit (typed, validated</text>
  <text class="s" x="764" y="330">against the contract)</text>

  <!-- LB <-> client -->
  <line class="flow" x1="861" y1="250" x2="861" y2="174"/>
  <text class="lbl" x="872" y="216">pull inputs</text>
  <line class="flow" x1="845" y1="174" x2="845" y2="246" stroke-dasharray="0"/>
  <text class="lbl" x="690" y="232" text-anchor="end">submit ZIP ↓</text>

  <!-- client -> server validate -->
  <rect class="card" x="506" y="250" width="190" height="92" rx="10"/>
  <text class="t" x="520" y="278">Server</text>
  <text class="s" x="520" y="298">validate manifest vs</text>
  <text class="s" x="520" y="314">contract · enqueue</text>
  <text class="s" x="520" y="330">Celery task</text>
  <line class="flow" x1="746" y1="296" x2="700" y2="296"/>

  <!-- server -> metric engine -->
  <rect class="card" x="262" y="250" width="190" height="92" rx="10"/>
  <text class="t" x="276" y="278">Metric engine</text>
  <text class="s" x="276" y="298">build typed context ·</text>
  <text class="s" x="276" y="314">topo-sort + pool ·</text>
  <text class="s" x="276" y="330">cache viz</text>
  <line class="flow" x1="506" y1="296" x2="456" y2="296"/>

  <!-- metric engine -> sandbox -->
  <rect class="sand" x="262" y="392" width="430" height="86" rx="10"/>
  <text class="t" x="276" y="420" fill="#7a3d06">🔒 Sandbox container (per job)</text>
  <text class="s" x="276" y="442" fill="#7a3d06">--network=none · --read-only · mem/cpu capped. ALL user code runs here:</text>
  <text class="s" x="276" y="460" fill="#7a3d06">metric() · visualization() · a registered dtype's visualize(blob, params).</text>
  <line class="flow" x1="357" y1="342" x2="357" y2="388"/>
  <text class="lbl" x="368" y="370">untrusted code</text>

  <!-- result -> leaderboard ranking -->
  <rect class="accent" x="28" y="250" width="190" height="92" rx="10"/>
  <text class="t" x="42" y="278">Ranking + compare</text>
  <text class="s" x="42" y="298">MetricResult per sub ·</text>
  <text class="s" x="42" y="314">leaderboard table ·</text>
  <text class="s" x="42" y="330">sample-by-sample view</text>
  <line class="flow" x1="262" y1="296" x2="222" y2="296"/>

  <text x="28" y="512" class="s" font-size="12">Storage: datasets live as a small preview tier; each leaderboard materializes its chosen subset at full resolution (charged to the LB owner's public quota).</text>
</svg>
