[pytest]
testpaths = tests
# Default invocation skips the docker-marked tests so day-to-day `pytest`
# stays in seconds and doesn't require Docker on the host. Run them via
# `make test-docker` (or `pytest -m docker --no-cov`).
addopts = -ra --strict-markers -m "not docker"
markers =
    docker: integration tests that build/run the sandbox runner image; slow, requires `docker` on PATH.
filterwarnings =
    ignore::DeprecationWarning:flask.*
    ignore::DeprecationWarning:sqlalchemy.*

# Coverage is configured in .coveragerc.
# Use `make cov` (or `pytest --cov --cov-fail-under=50`) for the gated run;
# the bare `pytest` invocation runs without coverage so it stays fast for
# day-to-day iteration.
