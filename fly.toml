# Fly.io configuration for BenchHub.
#
# IMPORTANT: replace `app = "benchhub"` with the name `fly launch` picks for
# you (or pass --name on first launch). The volume name `benchhub_data` and
# region `iad` are arbitrary defaults — pick the region closest to you.
#
# How to set this up the first time, end-to-end, see DEPLOY.md.

app = "benchhub"
primary_region = "iad"

# Same image runs both web and worker; CMD is overridden per process below.
[build]
  dockerfile = "Dockerfile"

[env]
  BENCHHUB_DATA_DIR = "/data"
  PORT = "8080"
  # SECRET_KEY, REDIS_URL, GIT_REPO_PATH (if used) → set via `fly secrets set`.

# One-shot migration container that runs before each deploy promotes traffic.
# `python app.py migrate` calls run_migrations() (idempotent — see app.py).
[deploy]
  release_command = "python app.py migrate"

# Two long-running process types.
[processes]
  web    = "gunicorn -b 0.0.0.0:8080 --workers 2 --timeout 120 app:app"
  worker = "celery -A app.celery worker --loglevel=info --concurrency=1"

# HTTPS terminator + autoscale for the web process. The worker has no public
# port, no http service block.
[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  # HTTP healthcheck — the root redirects to /projects, which is a 200.
  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/projects"
    protocol = "http"

# Persistent volume mounted into BOTH processes (they share SQLite + uploads).
# Created once via `fly volumes create benchhub_data --region iad --size 10`.
[mounts]
  source = "benchhub_data"
  destination = "/data"
  processes = ["web", "worker"]

# Modest VM — bump `memory_mb` if metric jobs OOM (matplotlib + scipy can
# spike). Web and worker share this profile by default.
[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 1024
