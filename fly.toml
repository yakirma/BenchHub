# fly.toml app configuration file generated for benchhub on 2026-05-05T23:27:51+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'benchhub'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'python app.py migrate'

[env]
  BENCHHUB_DATA_DIR = '/data'
  PORT = '8080'
  # Run check_and_migrate_db() + db.create_all() at gunicorn/celery import time.
  # Required because Fly's release_command runs in a temp VM that doesn't mount
  # the persistent volume, so [deploy].release_command can't bootstrap a
  # SQLite-on-volume schema by itself.
  BENCHHUB_AUTO_MIGRATE = '1'

# Single process group: the Dockerfile's ./start.sh runs both gunicorn and
# celery inside the one VM. Why: Fly volumes are 1:1 with machines, but the
# web + worker need to share /data (SQLite DB + uploads). Two process groups
# would mean two volumes, two divergent DBs.

[[mounts]]
  source = 'benchhub_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
