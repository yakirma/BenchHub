{% extends "base.html" %}

{% block title %}Documentation - Bench-Hub{% endblock %}

{% block content %}
<div class="row">
    <!-- Sidebar -->
    <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-body-tertiary sidebar collapse border-end p-3">
        <div class="position-sticky" style="top: 2rem;">
            <h5 class="mt-2 mb-3">Documentation</h5>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'index' }}"
                        href="{{ url_for('docs', page='index') }}">
                        <i class="bi bi-house-door me-2"></i> Overview
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'user_guide' }}"
                        href="{{ url_for('docs', page='user_guide') }}">
                        <i class="bi bi-rocket-takeoff me-2"></i> User Guide
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'data_types' }}"
                        href="{{ url_for('docs', page='data_types') }}">
                        <i class="bi bi-file-earmark-binary me-2"></i> Data Types
                    </a>
                </li>

                <li class="nav-item mt-3">
                    <h6 class="text-muted text-uppercase small ps-3">Developer Guide</h6>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'metrics' }}"
                        href="{{ url_for('docs', page='metrics') }}">
                        <i class="bi bi-calculator me-2"></i> Writing Metrics
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'visualizations' }}"
                        href="{{ url_for('docs', page='visualizations') }}">
                        <i class="bi bi-image me-2"></i> Visualizations
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-body d-flex align-items-center {{ 'active fw-bold' if page == 'api_reference' }}"
                        href="{{ url_for('docs', page='api_reference') }}">
                        <i class="bi bi-code-slash me-2"></i> API Reference
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-3">
        <div class="container-fluid" style="max-width: 900px;">
            {% block docs_content %}{% endblock %}
        </div>
    </main>
</div>

<style>
    /* Adaptive Sidebar Links */
    .sidebar .nav-link {
        border-radius: 5px;
        margin-bottom: 2px;
        transition: background-color 0.2s;
    }

    .sidebar .nav-link:hover {
        background-color: var(--bs-secondary-bg);
    }

    .sidebar .nav-link.active {
        background-color: var(--bs-primary);
        color: white !important;
    }

    /* Code Block Styling */
    pre {
        background-color: var(--bs-tertiary-bg);
        padding: 1rem;
        border-radius: 5px;
        border: 1px solid var(--bs-border-color);
        color: var(--bs-body-color);
    }

    code {
        color: var(--bs-primary);
    }
</style>
{% endblock %}
