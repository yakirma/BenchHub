{% extends "base.html" %}

{% block title %}General Settings - dTOF Benchmarking{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-gradient bg-primary text-white py-3">
                <h4 class="mb-0 fs-5"><i class="bi bi-sliders me-2"></i>Global Configuration</h4>
            </div>
            <div class="card-body">
                <form method="POST">

                    {% if g.current_project %}
                    <h5 class="mb-3">Project Settings</h5>
                    <div class="mb-4 p-3 bg-body-tertiary border rounded">
                        <div class="mb-3">
                            <label for="project_name" class="form-label">Project Name</label>
                            <input type="text" class="form-control" id="project_name" name="project_name"
                                value="{{ g.current_project.name }}" required>
                            <div class="form-text">
                                Current Project ID: {{ g.current_project.id }}
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="project_description" class="form-label">Project Description</label>
                            <textarea class="form-control" id="project_description" name="project_description"
                                rows="3">{{ g.current_project.description or '' }}</textarea>
                        </div>
                    </div>
                    {% endif %}

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-2"></i>Save Project Settings
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
