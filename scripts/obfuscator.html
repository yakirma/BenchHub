<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLP-Safe Code Obfuscator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        p {
            color: #64748b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            padding: 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: #eff6ff;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Code Obfuscator</h1>
        <p>Convert code to "Safe" text files to bypass DLP blocks.</p>

        <div id="drop-zone" class="drop-zone">
            <h3>Encoder</h3>
            Click to select or drag & drop a file to Obfuscate
            <input type="file" id="file-input" style="display: none" accept=".py,.txt">
        </div>

        <button id="download-btn" disabled>Download Safe File</button>
        <div id="status"></div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #e2e8f0;">

        <h1>Code Decoder</h1>
        <p>Restore original code from "Safe" text files.</p>

        <div id="decode-drop-zone" class="drop-zone">
            <h3>Decoder</h3>
            Click to select or drag & drop a .safe.txt file
            <input type="file" id="decode-file-input" style="display: none" accept=".txt">
        </div>

        <button id="decode-download-btn" disabled>Download Original File</button>
        <div id="decode-status"></div>
    </div>

    <script>
        // --- Encoder Logic ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const downloadBtn = document.getElementById('download-btn');
        const status = document.getElementById('status');

        let encodedContent = '';
        let originalFileName = '';

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            originalFileName = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                try {
                    encodedContent = 'BASE64:' + btoa(unescape(encodeURIComponent(content)));
                    status.innerText = `Ready: ${file.name}`;
                    status.className = 'success';
                    downloadBtn.disabled = false;
                } catch (err) {
                    status.innerText = "Error encoding file.";
                    status.className = 'error';
                }
            };
            reader.readAsText(file);
        }

        downloadBtn.onclick = () => {
            const blob = new Blob([encodedContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = originalFileName.replace(/\.(py|txt)$/, '') + '.safe.txt';
            a.click();
            URL.revokeObjectURL(url);
            status.innerText = "Downloaded!";
        };

        // --- Decoder Logic ---
        const decodeDropZone = document.getElementById('decode-drop-zone');
        const decodeFileInput = document.getElementById('decode-file-input');
        const decodeDownloadBtn = document.getElementById('decode-download-btn');
        const decodeStatus = document.getElementById('decode-status');

        let decodedContent = '';
        let decodedFileName = '';

        decodeDropZone.onclick = () => decodeFileInput.click();
        decodeFileInput.onchange = (e) => handleDecodeFile(e.target.files[0]);

        decodeDropZone.ondragover = (e) => { e.preventDefault(); decodeDropZone.classList.add('drag-over'); };
        decodeDropZone.ondragleave = () => decodeDropZone.classList.remove('drag-over');
        decodeDropZone.ondrop = (e) => {
            e.preventDefault();
            decodeDropZone.classList.remove('drag-over');
            handleDecodeFile(e.dataTransfer.files[0]);
        };

        function handleDecodeFile(file) {
            if (!file) return;
            decodedFileName = file.name.replace('.safe.txt', '.restored.txt'); // Attempt to restore extension?
            // If original was .py.safe.txt -> .py.restored
            // But we don't know original extension for sure unless we encoded it in metadata.
            // Current simple logic: just remove .safe.txt and append .restored.txt or similar.
            // Let's try to be smart: if it ends in .safe.txt, remove .safe and put expected ext if valid?
            // Actually, simply appending .restored is safest.
            if (file.name.endsWith('.safe.txt')) {
                decodedFileName = file.name.replace('.safe.txt', '.txt'); // Default back to txt or original if contained
            } else {
                decodedFileName = file.name + '.decoded';
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                try {
                    if (content.startsWith('BASE64:')) {
                        const payload = content.substring(7);
                        decodedContent = decodeURIComponent(escape(atob(payload)));
                        decodeStatus.innerText = `Ready to decode: ${file.name}`;
                        decodeStatus.className = 'success';
                        decodeDownloadBtn.disabled = false;
                    } else {
                        throw new Error("Invalid file format (missing BASE64: prefix)");
                    }
                } catch (err) {
                    decodeStatus.innerText = `Error: ${err.message}`;
                    decodeStatus.className = 'error';
                    decodeDownloadBtn.disabled = true;
                }
            };
            reader.readAsText(file);
        }

        decodeDownloadBtn.onclick = () => {
            const blob = new Blob([decodedContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = decodedFileName;
            a.click();
            URL.revokeObjectURL(url);
            decodeStatus.innerText = "Decoded & Downloaded!";
        };
    </script>
</body>

</html>
